# Columbia STS-107 Damage Simulation
# External tank foam impact → RCC breach → reentry breakup

[mission]
name = Columbia STS-107 Damage Simulation
targetAp_km = 185.0
targetPe_km = 180.0
maxDuration_s = 7200

[damage]
initial_tps = 0.0
initial_structural = 0.0
tps_ablation_threshold = 200000.0
structural_failure_threshold = 0.6

[thermal]
sutton_graves_k = 0.000183
nose_radius_m = 1.0
convection_coefficient = 1e-5
damage_heat_multiplier = 10.0
ablation_rate_coefficient = 6.67e-8

[structural]
onset_dynamic_pressure = 1000.0
reference_dynamic_pressure = 50000.0
rate_coefficient = 0.02
q_ratio_min = 0.1
q_ratio_max = 5.0
break_time_threshold = 1000.0
break_altitude_threshold = 200000.0
breakup_damage_amount = 0.8

# === 泡沫撞击：T+81s ===
[event.FoamImpact]
condition_1_type = TimeElapsed
condition_1_value = 81.0
command_1_type = ApplyDamage
command_1_value = 0.35
command_1_message = "Foam impact - structural breach in left wing RCC panel"

