# Artemis II Mission Configuration
# Real SLS Block 1 (Space Launch System) parameters from NASA
# Not Falcon 9 - actual Artemis II launch vehicle

[mission]
name=Artemis II SLS
targetAp_km=270000.0
targetPe_km=2000.0
maxDuration_s=7200.0

[rs25]
# RS-25 Engine (Space Shuttle heritage, 4 engines on SLS Block 1)
# NASA official specs
engineCount=4
thrustSeaLevel_N=1860000.0
thrustVacuum_N=2279000.0
seaLevelIsp_s=366.0
vacuumIsp_s=452.0
fuelRatio=0.143    # LH2: 14.3%
oxRatio=0.857      # LOX: 85.7%
OF_ratio=6.0       # LOX/LH2 ratio

[rl10]
# RL10C-2 ICPS engine (Artemis II)
# NASA official specs
thrust_N=110000.0
seaLevelIsp_s=200.0
vacuumIsp_s=465.0
fuelRatio=0.153
oxRatio=0.847
OF_ratio=5.5

[aj10]
# AJ10-190 Orion Service Module
# ESA/Orion official specs
thrust_N=26700.0
seaLevelIsp_s=112.0
vacuumIsp_s=316.0
fuelRatio=0.377
oxRatio=0.623
OF_ratio=1.65

[srb]
# Solid Rocket Boosters (2 five-segment boosters)
# NASA official specs - NOT liquid fuel engines
engineCount=2
thrustSeaLevel_N=14679000.0
thrustVacuum_N=16014000.0
ispSeaLevel_s=250
ispVacuum_s=280
isSolid=true
burnTime_s=126.0

[core_stage]
# SLS Core Stage (liquid fuel)
# NASA official specs: 537,000 gal LH2, 196,000 gal LOX
lh2Mass_kg=144000.0
lh2Dry_kg=9500.0
loxMass_kg=840000.0
loxDry_kg=4500.0

[icps_tanks]
# Interim Cryogenic Propulsion Stage
# Modified Delta IV Heavy stage
lh2Mass_kg=25800.0
lh2Dry_kg=2000.0
loxMass_kg=142000.0
loxDry_kg=2000.0

[orion_tanks]
# Orion Service Module (European)
# ESA official: ~8,600 kg usable propellant
mmhMass_kg=4300.0
mmhDry_kg=400.0
ntoMass_kg=4300.0
ntoDry_kg=400.0

[guidance]
# SLS gravity turn profile
pitchStartAlt_m=3000.0
pitchEndAlt_m=90000.0
orbitTolerance_m=5000.0

[launch]
# Launch time configuration
datetime=2026-04-09T18:00:00Z
timezone=UTC
window_start=2026-04-09T17:00:00Z
window_end=2026-04-09T22:00:00Z
auto_calculate_window=true

[launch_site]
# Kennedy Space Center Launch Complex 39A
name=Kennedy Space Center
latitude=28.5721
longitude=-80.6480
altitude_m=3
timezone=America/New_York
pad=LC-39A

[weather]
# Weather system configuration (optional - can be disabled)
enabled=false
real_time_data=false
temperature_C=25.0
humidity_pct=70.0
pressure_hPa=1013.25
wind_speed_ms=5.0
wind_direction_deg=180
cloud_cover_pct=30
variation_enabled=false
random_seed=12345