# Artemis II Mission Configuration
# Format: section.key=value
# Real engine data based on NASA/SpaceX specs

[mission]
name=Artemis II
targetAp_km=200.0
targetPe_km=175.0
maxDuration_s=14400.0

[merlin]
# Merlin 1D Sea Level Engine
# Real specs: 845 kN sea level, 934 kN vacuum
# 13 engines × 845 kN = 11 MN total
engineCount=13
thrustSeaLevel_N=845000.0
thrustVacuum_N=934000.0
seaLevelIsp_s=282.0
vacuumIsp_s=311.0
fuelRatio=0.299
oxRatio=0.701
OF_ratio=2.35

[rl10]
# RL10B-2 ICPS engine
# Real thrust: 110 kN vacuum
thrust_N=110000.0
seaLevelIsp_s=200.0
vacuumIsp_s=448.0
fuelRatio=0.153
oxRatio=0.847
OF_ratio=5.5

[aj10]
thrust_N=267000.0
seaLevelIsp_s=112.0
vacuumIsp_s=319.0
fuelRatio=0.377
oxRatio=0.623
OF_ratio=1.65

[core_tanks]
# Realistic Falcon 9 Block 5 first stage
# Total: ~395 tonnes (O/F = 2.35)
rp1Mass_kg=118000.0
rp1Dry_kg=3000.0
loxMass_kg=277300.0
loxDry_kg=3000.0

[second_stage_tanks]
# Falcon 9 second stage
