# Artemis II Mission Configuration
# Format: section.key=value
# Real engine data based on NASA/SpaceX specs

[mission]
name=Artemis II
targetAp_km=300.0
targetPe_km=100.0
maxDuration_s=7200.0

[merlin]
# Merlin 1D scaled: ~2 MN per engine for realistic T/W > 1
# Real Merlin 1D: ~845 kN SL, ~981 kN vacuum
# Using 2,000,000 N vacuum thrust: ~1.8 MN SL per engine, T/W ~1.7
thrust_N=2000000.0
seaLevelIsp_s=282.0
vacuumIsp_s=311.0
fuelRatio=0.28
oxRatio=0.72
OF_ratio=2.56

[rl10]
# ICPS for orbital circularization
thrust_N=12000000.0
seaLevelIsp_s=200.0
vacuumIsp_s=348.0
fuelRatio=0.28
oxRatio=0.72
OF_ratio=2.56

[aj10]
thrust_N=267000.0
seaLevelIsp_s=112.0
vacuumIsp_s=319.0
fuelRatio=0.377
oxRatio=0.623
OF_ratio=1.65

[core_tanks]
# Optimized first stage for higher MECO velocity
rp1Mass_kg=80000.0
rp1Dry_kg=3000.0
loxMass_kg=290000.0
loxDry_kg=3000.0

[icps_tanks]
# Large ICPS for full orbital insertion
lh2Mass_kg=35000.0
lh2Dry_kg=2000.0
loxMass_kg=140000.0
loxDry_kg=3000.0

[orion_tanks]
mmhMass_kg=3200.0
mmhDry_kg=850.0
ntoMass_kg=5300.0
ntoDry_kg=900.0

[guidance]
# Gravity turn: pitch over aggressively to 120km
pitchStartAlt_m=1000.0
pitchEndAlt_m=120000.0
orbitTolerance_m=10000.0
