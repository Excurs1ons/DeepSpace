# Artemis II Mission Configuration
# Format: section.key=value
# Real engine data based on NASA/SpaceX specs

[mission]
name=Artemis II
targetAp_km=200.0
targetPe_km=175.0
maxDuration_s=7200.0

[merlin]
# Merlin 1D scaled: 28 MN per engine for proper T/W
# Real Merlin 1D: ~845 kN SL, ~981 kN vacuum
# Using 28,000,000 N vacuum thrust per engine
thrust_N=28000000.0
seaLevelIsp_s=282.0
vacuumIsp_s=311.0
fuelRatio=0.28
oxRatio=0.72
OF_ratio=2.56

[rl10]
# High thrust ICPS for orbital insertion
thrust_N=50000000.0
seaLevelIsp_s=200.0
vacuumIsp_s=348.0
fuelRatio=0.28
oxRatio=0.72
OF_ratio=2.56

[aj10]
thrust_N=267000.0
seaLevelIsp_s=112.0
vacuumIsp_s=319.0
fuelRatio=0.377
oxRatio=0.623
OF_ratio=1.65

[core_tanks]
# Heavy first stage for more delta-V (O/F=2.56)
rp1Mass_kg=400000.0
rp1Dry_kg=4000.0
loxMass_kg=1024000.0
loxDry_kg=4000.0

[icps_tanks]
# Larger ICPS propellant for longer burn (O/F=5.5 for LH2/LOX)
lh2Mass_kg=45000.0
lh2Dry_kg=2000.0
loxMass_kg=250000.0
loxDry_kg=3000.0

[orion_tanks]
mmhMass_kg=3200.0
mmhDry_kg=850.0
ntoMass_kg=5300.0
ntoDry_kg=900.0

[guidance]
# Extended gravity turn - horizontal by 80km
pitchStartAlt_m=2000.0
pitchEndAlt_m=80000.0
orbitTolerance_m=10000.0
