# Artemis II Mission Configuration
# Format: section.key=value
# Real engine data based on NASA/SpaceX specs

[mission]
name=Artemis II
targetAp_km=200.0
targetPe_km=175.0
maxDuration_s=7200.0

[merlin]
# Merlin 1D scaled: 1.5 MN per engine for realistic T/W
# 13 engines × 1.5 MN = 19.5 MN total
thrust_N=1500000.0
seaLevelIsp_s=282.0
vacuumIsp_s=311.0
fuelRatio=0.28
oxRatio=0.72
OF_ratio=2.56

[rl10]
# High thrust ICPS for orbital insertion
thrust_N=50000000.0
seaLevelIsp_s=200.0
vacuumIsp_s=348.0
fuelRatio=0.28
oxRatio=0.72
OF_ratio=2.56

[aj10]
thrust_N=267000.0
seaLevelIsp_s=112.0
vacuumIsp_s=319.0
fuelRatio=0.377
oxRatio=0.623
OF_ratio=1.65

[core_tanks]
# Balanced first stage with realistic mass
rp1Mass_kg=150000.0
rp1Dry_kg=3000.0
loxMass_kg=384000.0
loxDry_kg=3000.0

[icps_tanks]
# ICPS with proper LH2/LOX ratio
lh2Mass_kg=16000.0
lh2Dry_kg=2000.0
loxMass_kg=88000.0
loxDry_kg=3000.0

[orion_tanks]
mmhMass_kg=3200.0
mmhDry_kg=850.0
ntoMass_kg=5300.0
ntoDry_kg=900.0

[guidance]
# Extended gravity turn - horizontal by 80km
pitchStartAlt_m=2000.0
pitchEndAlt_m=80000.0
orbitTolerance_m=10000.0
