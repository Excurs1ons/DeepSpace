# Falcon 9 Block 5 Simulation Configuration
# Real engine data based on SpaceX specifications
# Architecture: Merlin 1D × 9 (first stage) + Merlin 1D Vacuum × 1 (second stage)

[mission]
name=Falcon 9 Clone
targetAp_km=200.0
targetPe_km=175.0
maxDuration_s=7200.0

[merlin]
# Merlin 1D Sea Level Engine (×9 on first stage)
# Real specs: 845 kN sea level, 934 kN vacuum
# Isp: 282s sea level, 311s vacuum
# O/F ratio: ~2.35 (RP-1/LOX)
engineCount=9
thrustSeaLevel_N=845000.0
thrustVacuum_N=934000.0
seaLevelIsp_s=282.0
vacuumIsp_s=311.0
fuelRatio=0.299
oxRatio=0.701
OF_ratio=2.35

[merlin_vacuum]
# Merlin 1D Vacuum Engine (×1 on second stage)
# Optimized nozzle for space operation
# Thrust: ~934 kN
# Isp: 348s vacuum
thrust_N=934000.0
vacuumIsp_s=348.0
fuelRatio=0.299
oxRatio=0.701
OF_ratio=2.35

[aj10]
# Keeping AJ10 for Orion Service Module (if used)
# Not used in pure Falcon 9 simulation
thrust_N=267000.0
seaLevelIsp_s=112.0
vacuumIsp_s=319.0
fuelRatio=0.377
oxRatio=0.623
OF_ratio=1.65

[core_tanks]
# Falcon 9 Block 5 first stage propellant
# Real: ~395 tonnes total (LOX + RP-1)
# LOX/RP-1 ratio: ~2.35:1
rp1Mass_kg=118000.0
rp1Dry_kg=3900.0
loxMass_kg=277000.0
loxDry_kg=3900.0

[second_stage_tanks]
# Falcon 9 second stage (Merlin Vacuum)
# Real: ~111,500 kg propellant
rp1Mass_kg=32000.0
rp1Dry_kg=1200.0
loxMass_kg=75200.0
loxDry_kg=1200.0

[orion_tanks]
# Orion Service Module (if simulating Orion + F9)
mmhMass_kg=3200.0
mmhDry_kg=850.0
ntoMass_kg=5300.0
ntoDry_kg=900.0

[guidance]
# Extended gravity turn - Falcon 9 style
pitchStartAlt_m=2000.0
pitchEndAlt_m=70000.0
orbitTolerance_m=10000.0
