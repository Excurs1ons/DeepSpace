# Artemis II Mission Configuration + Columbia STS-107 Damage Profile
# 在 Artemis II 月球往返任务基础上应用初始 TPS 损伤，
# 模拟在轨飞越后返回再入时的解体场景

[mission]
name = Artemis II + Columbia Damage
targetAp_km = 185.0
targetPe_km = 180.0
maxDuration_s = 950400

[damage]
initial_tps = 0.5                 # 左翼 RCC 面板局部贯通（模拟泡沫撞击孔洞）
initial_structural = 0.0
tps_ablation_threshold = 200000.0
structural_failure_threshold = 0.6

[thermal]
sutton_graves_k = 0.000183
nose_radius_m = 1.0
convection_coefficient = 1e-5
damage_heat_multiplier = 10.0
ablation_rate_coefficient = 6.67e-8

[structural]
onset_dynamic_pressure = 1000.0
reference_dynamic_pressure = 50000.0
rate_coefficient = 0.02
q_ratio_min = 0.1
q_ratio_max = 5.0
break_time_threshold = 1000.0
break_altitude_threshold = 200000.0
breakup_damage_amount = 0.8

[rs25]
thrustSeaLevel_N = 1860000
thrustVacuum_N = 2279000
engineCount = 4
seaLevelIsp_s = 366.0
vacuumIsp_s = 452.3
OF_ratio = 6.0

[srb]
thrustSeaLevel_N = 14600000
thrustVacuum_N = 16400000
engineCount = 2
ispSeaLevel_s = 242.0
ispVacuum_s = 269.0
OF_ratio = 1.0

[rl10]
thrust_N = 47700
seaLevelIsp_s = 200.0
vacuumIsp_s = 462.0
OF_ratio = 5.88

[aj10]
thrust_N = 21100
seaLevelIsp_s = 240.0
vacuumIsp_s = 316.0
OF_ratio = 1.6

[core_stage]
lh2Mass_kg = 144000
lh2Dry_kg = 25000
loxMass_kg = 840000
loxDry_kg = 15000

[srb_fuel]
solidMass_kg = 628000
solidDry_kg = 1000

[icps_tanks]
lh2Mass_kg = 4000
lh2Dry_kg = 3500
loxMass_kg = 23500
loxDry_kg = 2000

[orion_tanks]
mmhMass_kg = 5000
mmhDry_kg = 800
ntoMass_kg = 3000
ntoDry_kg = 500

[tcm]
enabled = true
target_dv = -200.0

[guidance]
algorithm = peg
pitchStartAlt_m = 2000.0
pitchEndAlt_m = 220000.0
pitchEndAngle_deg = 90.0
orbitTolerance_m = 10000.0

[launch]
datetime = 2026-07-23T12:00:00Z
latitude_deg = 28.5
longitude_deg = -80.6

[transition.Launch]
from = PreLaunch
to = Launch
require_all = true
condition_1_type = TimeElapsed
condition_1_value = 0

[transition.Ascent]
from = Launch
to = Ascent
require_all = true
condition_1_type = AltitudeAbove
condition_1_value = 1000

[transition.MaxQ]
from = Ascent
to = MaxQ
require_all = true
condition_1_type = MaxqPassed

[transition.Orbit]
from = MaxQ
to = Orbit
require_all = true
condition_1_type = VelocityRatioAbove
condition_1_value = 0.95

[transition.TEI]
from = Orbit
to = TEI
require_all = true
condition_1_type = FlagIsTrue
condition_1_parameter = cutoff_fired
condition_1_value = 1
condition_2_type = TimeElapsed
condition_2_value = 900

[transition.Translunar]
from = TEI
to = Translunar
require_all = true
condition_1_type = FlagIsTrue
condition_1_parameter = tli_complete

[transition.MissionEvents]
from = Translunar
to = MissionEvents
require_all = true
condition_1_type = TimeSincePhaseAbove
condition_1_value = 200000

[transition.Reentry]
from = MissionEvents
to = Reentry
require_all = true
condition_1_type = AltitudeBelow
condition_1_value = 120000
condition_2_type = TimeElapsed
condition_2_value = 600000

[transition.Success]
from = Reentry
to = Success
require_all = true
condition_1_type = AltitudeBelow
condition_1_value = 1000
condition_2_type = VelocityBelow
condition_2_value = 20

[event.Liftoff]
description = Vehicle cleared the tower
condition_1_type = AltitudeAbove
condition_1_value = 100

[event.MaxQ_Report]
description = Maximum aerodynamic pressure
condition_1_type = MaxqPassed

[event.MECO]
description = Main engine cutoff, beginning coast
condition_1_type = EngineCutoff

[event.Orbit_Inserted]
description = Successfully inserted into parking orbit
condition_1_type = TimeElapsed
condition_1_value = 600
condition_2_type = AltitudeAbove
condition_2_value = 150000

[event.TLI_Complete]
description = Trans-lunar injection burn complete
condition_1_type = FlagIsTrue
condition_1_parameter = tli_complete

[event.Lunar_Flyby]
description = Approaching lunar vicinity
condition_1_type = TimeSincePhaseAbove
condition_1_value = 200000

[event.Reentry_Interface]
description = Vehicle entering Earth's atmosphere
condition_1_type = AltitudeBelow
condition_1_value = 120000

[event.Splashdown]
description = Mission complete — safe splashdown
condition_1_type = AltitudeBelow
condition_1_value = 1000
condition_2_type = VelocityBelow
condition_2_value = 20
